<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>軽貨物 点呼アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c3e50">
</head>

<body>

<div id="loginBox">
  <h2>管理者ログイン</h2>
  <input id="pass" type="password" placeholder="パスワード">
  <button onclick="login()">ログイン</button>
</div>

<div id="app" style="display:none;">

  <h1>軽貨物 点呼アプリ</h1>

  <button onclick="showPage('home')">ホーム</button>
  <button onclick="showPage('tenkoPage')">点呼入力</button>
  <button onclick="showPage('driverPage')">ドライバー登録</button>
  <button onclick="showPage('missingPage')">未点呼確認</button>
  <button onclick="showPage('historyPage')">点呼履歴</button>

  <hr>

  <div id="home">
    <h2>ホーム</h2>
    <p>メニューから操作してください。</p>
  </div>

  <div id="tenkoPage" style="display:none;">
    <h2>点呼入力</h2>

    <p>名前</p>
    <select id="namae"></select>

    <p>アルコールチェック</p>
    <select id="alcohol">
      <option>異常なし</option>
      <option>異常あり</option>
    </select>

    <p>体調</p>
    <select id="health">
      <option>良好</option>
      <option>不良</option>
    </select>

    <br><br>
    <button onclick="tenko()">点呼する</button>
  </div>

  <div id="driverPage" style="display:none;">
    <h2>ドライバー登録</h2>

    <input id="driverName" type="text" placeholder="ドライバー名">
    <button onclick="addDriver()">登録</button>

    <h3>登録ドライバー</h3>
    <div id="driverList"></div>
  </div>

  <div id="missingPage" style="display:none;">
    <h2>未点呼確認</h2>
    <button onclick="renderMissing()">未点呼を確認</button>
    <div id="missingList"></div>
  </div>

  <div id="historyPage" style="display:none;">
    <h2>点呼履歴</h2>

    <button onclick="renderToday()">今日のみ表示</button>
    <button onclick="renderAll()">全期間表示</button>
    <button onclick="exportCSV()">CSV出力</button>
    <button onclick="clearAll()">履歴クリア</button>

    <div id="rekishi"></div>
  </div>

</div>

<script>
function login() {
  const pass = document.getElementById("pass").value;
  const adminPass = "1234";

  if (pass === adminPass) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";

    loadDrivers();
    showPage("home");
  } else {
    alert("パスワードが違います");
  }
}

function showPage(pageId) {
  const pages = ["home", "tenkoPage", "driverPage", "missingPage", "historyPage"];

  pages.forEach(id => {
    document.getElementById(id).style.display = "none";
  });

  document.getElementById(pageId).style.display = "block";

  if (pageId === "driverPage") renderDrivers();
  if (pageId === "missingPage") renderMissing();
  if (pageId === "historyPage") renderToday();
}

function getToday() {
  return new Date().toISOString().slice(0, 10);
}

function getDrivers() {
  return JSON.parse(localStorage.getItem("drivers") || "[]");
}

function saveDrivers(drivers) {
  localStorage.setItem("drivers", JSON.stringify(drivers));
}

function addDriver() {
  const name = document.getElementById("driverName").value;

  if (name === "") {
    alert("ドライバー名を入力してください");
    return;
  }

  let drivers = getDrivers();

  if (drivers.includes(name)) {
    alert("すでに登録されています");
    return;
  }

  drivers.push(name);
  saveDrivers(drivers);

  document.getElementById("driverName").value = "";

  loadDrivers();
  renderDrivers();

  alert("登録しました");
}

function deleteDriver(index) {
  let drivers = getDrivers();

  if (confirm("このドライバーを削除しますか？")) {
    drivers.splice(index, 1);
    saveDrivers(drivers);
    loadDrivers();
    renderDrivers();
  }
}

function loadDrivers() {
  const drivers = getDrivers();
  const select = document.getElementById("namae");

  select.innerHTML = "";

  if (drivers.length === 0) {
    select.innerHTML = `<option value="">ドライバー未登録</option>`;
    return;
  }

  drivers.forEach(name => {
    select.innerHTML += `<option>${name}</option>`;
  });
}

function renderDrivers() {
  const drivers = getDrivers();
  const div = document.getElementById("driverList");

  div.innerHTML = "";

  if (drivers.length === 0) {
    div.innerHTML = "<p>まだ登録されていません。</p>";
    return;
  }

  drivers.forEach((name, index) => {
    div.innerHTML += `
      <p>
        ${name}
        <button onclick="deleteDriver(${index})">削除</button>
      </p>
    `;
  });
}

function tenko() {
  const namae = document.getElementById("namae").value;
  const alcohol = document.getElementById("alcohol").value;
  const health = document.getElementById("health").value;

  if (namae === "") {
    alert("ドライバーを登録してください");
    return;
  }

  const data = {
    name: namae,
    alcohol: alcohol,
    health: health,
    time: new Date().toLocaleString(),
    date: getToday()
  };

  let list = JSON.parse(localStorage.getItem("tenkoRekishi") || "[]");
  list.push(data);
  localStorage.setItem("tenkoRekishi", JSON.stringify(list));

  alert("点呼完了！");
}

function renderMissing() {
  const drivers = getDrivers();
  const list = JSON.parse(localStorage.getItem("tenkoRekishi") || "[]");
  const today = getToday();

  const div = document.getElementById("missingList");
  div.innerHTML = "";

  if (drivers.length === 0) {
    div.innerHTML = "<p>ドライバーが登録されていません。</p>";
    return;
  }

  drivers.forEach(driver => {
    const done = list.some(item => item.name === driver && item.date === today);

    if (done) {
      div.innerHTML += `<p>✅ ${driver}：点呼済み</p>`;
    } else {
      div.innerHTML += `<p style="color:red;">🔴 ${driver}：未点呼</p>`;
    }
  });
}

function renderToday() {
  let list = JSON.parse(localStorage.getItem("tenkoRekishi") || "[]");
  const div = document.getElementById("rekishi");
  div.innerHTML = "";

  const today = getToday();

  list.forEach((item, index) => {
    if (item.date === today) {
      div.innerHTML += `
        <p>
          ${item.time}｜${item.name}｜${item.alcohol}｜${item.health}
          <button onclick="deleteOne(${index})">削除</button>
        </p>
      `;
    }
  });
}

function renderAll() {
  let list = JSON.parse(localStorage.getItem("tenkoRekishi") || "[]");
  const div = document.getElementById("rekishi");
  div.innerHTML = "";

  list.forEach((item, index) => {
    div.innerHTML += `
      <p>
        ${item.time}｜${item.name}｜${item.alcohol}｜${item.health}
        <button onclick="deleteOne(${index})">削除</button>
      </p>
    `;
  });
}

function deleteOne(index) {
  let list = JSON.parse(localStorage.getItem("tenkoRekishi") || "[]");
  list.splice(index, 1);
  localStorage.setItem("tenkoRekishi", JSON.stringify(list));
  renderToday();
}

function clearAll() {
  if (confirm("全部削除しますか？")) {
    localStorage.removeItem("tenkoRekishi");
    renderToday();
  }
}

function exportCSV() {
  let list = JSON.parse(localStorage.getItem("tenkoRekishi") || "[]");

  if (list.length === 0) {
    alert("データがありません");
    return;
  }

  const today = getToday();
  let csv = "\uFEFF時間,名前,アルコール,体調\n";

  list.forEach(item => {
    csv += `${item.time},${item.name},${item.alcohol},${item.health}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `tenko_${today}.csv`;
  a.click();

  URL.revokeObjectURL(url);
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
