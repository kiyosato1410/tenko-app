<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BELLE HOUSE 点呼システム</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root { --navy:#0b1f3a; --bg:#f4f7fb; --white:#fff; --line:#d9e2ef; --red:#c62828; --green:#1b7f3a; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, sans-serif; background:var(--bg); color:var(--navy); }
    header { background:var(--navy); color:white; padding:18px; text-align:center; font-size:22px; font-weight:bold; }
    .box { max-width:560px; margin:18px auto; background:white; padding:20px; border-radius:14px; box-shadow:0 4px 12px rgba(0,0,0,.08); }
    input, select, button, textarea { width:100%; padding:12px; margin:8px 0 14px; border-radius:8px; border:1px solid #b8c6d8; font-size:16px; }
    button { background:var(--navy); color:white; border:none; font-weight:bold; cursor:pointer; }
    button.sub { background:white; color:var(--navy); border:1px solid var(--navy); }
    button.warn { background:#666; }
    .hidden { display:none; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .status { padding:10px; border-radius:8px; background:#eef4fb; margin:8px 0 14px; white-space:pre-wrap; }
    .ok { color:var(--green); font-weight:bold; }
    .danger { color:var(--red); font-weight:bold; }
    .record { border:1px solid var(--line); background:#fafcff; border-radius:10px; padding:12px; margin:10px 0; font-size:14px; }
    .record img { width:100%; max-height:280px; object-fit:contain; border-radius:8px; margin-top:8px; background:#eee; }
    .small { font-size:13px; opacity:.8; }
  </style>
</head>
<body>
<header>BELLE HOUSE 点呼システム</header>

<div class="box" id="loginBox">
  <h2>ログイン</h2>
  <label>ログイン区分</label>
  <select id="loginType">
    <option value="driver">ドライバー</option>
    <option value="佐藤清貴">管理者</option>
  </select>
  <label>名前または管理者ID</label>
  <input id="loginName" placeholder="例：佐藤 / 佐藤清貴" />
  <label>パスワード</label>
  <input id="loginPassword" type="password" placeholder="管理者は 1234" />
  <button type="button" onclick="login()">ログイン</button>
  <p class="small">ドライバーは名前と任意のパスワードで入れます。管理者は 佐藤清貴 / 1234。</p>
</div>

<div class="box hidden" id="driverBox">
  <h2>ドライバー点呼</h2>
  <p id="driverName" class="ok"></p>

  <label>点呼区分</label>
  <select id="tenkoType">
    <option value="運行前点呼">運行前点呼</option>
    <option value="運行後点呼">運行後点呼</option>
  </select>

  <label>アルコール測定値</label>
  <input id="alcoholValue" placeholder="例：0.00" inputmode="decimal" />

  <label>アルコールチェック</label>
  <select id="alcohol">
    <option value="異常なし">異常なし</option>
    <option value="異常あり">異常あり</option>
  </select>

  <label>体調</label>
  <select id="health">
    <option value="良好">良好</option>
    <option value="不良">不良</option>
  </select>

  <label>車両状態</label>
  <select id="carStatus">
    <option value="異常なし">異常なし</option>
    <option value="異常あり">異常あり</option>
  </select>

  <label>免許証確認</label>
  <select id="licenseCheck">
    <option value="確認済み">確認済み</option>
    <option value="未確認">未確認</option>
  </select>

  <label>写真添付</label>
  <input type="file" id="photo" accept="image/*" capture="environment" />
  <p class="small">写真なしでも送信できます。写真を選ぶとFirebase Storageに保存します。</p>

  <button type="button" class="sub" onclick="getGps()">GPS取得</button>
  <div id="gpsText" class="status">GPS未取得</div>

  <label>備考</label>
  <textarea id="memo" rows="3" placeholder="連絡事項や異常内容"></textarea>

  <button type="button" onclick="submitTenko()">点呼を送信</button>
  <div id="sendStatus" class="status">送信待ち</div>
  <button type="button" class="sub" onclick="logout()">ログアウト</button>
</div>

<div class="box hidden" id="佐藤清貴Box">
  <h2>管理者画面</h2>
  <button type="button" onclick="loadRecords()">最新の点呼を表示</button>
  <button type="button" class="sub" onclick="downloadCsv()">CSV出力</button>
  <button type="button" class="sub" onclick="logout()">ログアウト</button>
  <div id="records"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCtj53F9aECPPfP1zOkVg5MPaoKWx7Y_cs",
  authDomain: "bellehouse-tenko.firebaseapp.com",
  projectId: "bellehouse-tenko",
  storageBucket: "bellehouse-tenko.firebasestorage.app",
  messagingSenderId: "384954757173",
  appId: "1:384954757173:web:f04243c699bcb4835ac17c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = "";
let gpsData = null;
let latestRecords = [];

function setStatus(message) {
  document.getElementById("sendStatus").innerText = message;
}

function login() {
  const type = document.getElementById("loginType").value;
  const name = document.getElementById("loginName").value.trim();
  const pass = document.getElementById("loginPassword").value.trim();

  if (!name || !pass) {
    alert("名前とパスワードを入力してください");
    return;
  }

  if (type === "佐藤清貴") {
    if (name === "佐藤清貴" && pass === "1234") {
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("佐藤清貴Box").classList.remove("hidden");
      loadRecords();
    } else {
      alert("管理者IDまたはパスワードが違います");
    }
    return;
  }

  currentUser = name;
  document.getElementById("driverName").innerText = currentUser + " さんでログイン中";
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("driverBox").classList.remove("hidden");
}

function logout() { location.reload(); }

function getGps() {
  const gpsText = document.getElementById("gpsText");
  gpsText.innerText = "GPS取得中...";

  if (!navigator.geolocation) {
    gpsText.innerText = "この端末ではGPSが使えません。GPSなしで送信できます。";
    gpsData = null;
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(position) {
      gpsData = {
        lat: position.coords.latitude,
        lng: position.coords.longitude,
        accuracy: position.coords.accuracy
      };
      gpsText.innerText = "GPS取得済み：" + gpsData.lat + ", " + gpsData.lng;
    },
    function(error) {
      gpsData = null;
      gpsText.innerText = "GPS未取得：位置情報が許可されていません。GPSなしで送信できます。";
    },
    { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
  );
}

async function submitTenko() {
  setStatus("送信中...");

  if (!currentUser) {
    alert("ログインしてください");
    setStatus("ログインしてください");
    return;
  }

  const fileInput = document.getElementById("photo");
  const file = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
  let photoUrl = "";

  try {
    if (file) {
      setStatus("写真をアップロード中...");
      const nowMs = Date.now();
      const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
      const fileName = "tenko_photos/" + currentUser + "_" + nowMs + "_" + safeName;
      const storageRef = storage.ref(fileName);
      await storageRef.put(file);
      photoUrl = await storageRef.getDownloadURL();
    }

    setStatus("点呼データを保存中...");
    await db.collection("tenkoRecords").add({
      driver: currentUser,
      type: document.getElementById("tenkoType").value,
      alcoholValue: document.getElementById("alcoholValue").value.trim(),
      alcohol: document.getElementById("alcohol").value,
      health: document.getElementById("health").value,
      carStatus: document.getElementById("carStatus").value,
      licenseCheck: document.getElementById("licenseCheck").value,
      memo: document.getElementById("memo").value.trim(),
      gps: gpsData || null,
      photoUrl: photoUrl,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdAtLocal: new Date().toLocaleString("ja-JP")
    });

    alert("点呼を送信しました");
    setStatus("送信完了");
    fileInput.value = "";
    document.getElementById("memo").value = "";
    document.getElementById("gpsText").innerText = "GPS未取得";
    gpsData = null;
  } catch (error) {
    console.error(error);
    const msg = error && error.message ? error.message : String(error);
    alert("送信に失敗しました：" + msg);
    setStatus("送信に失敗しました：" + msg);
  }
}

async function loadRecords() {
  const recordsDiv = document.getElementById("records");
  recordsDiv.innerHTML = "読み込み中...";
  latestRecords = [];

  try {
    const snapshot = await db.collection("tenkoRecords").orderBy("createdAt", "desc").limit(100).get();
    recordsDiv.innerHTML = "";

    if (snapshot.empty) {
      recordsDiv.innerHTML = "記録はまだありません。";
      return;
    }

    snapshot.forEach(doc => {
      const r = doc.data();
      latestRecords.push(r);
      const date = r.createdAt ? r.createdAt.toDate().toLocaleString("ja-JP") : (r.createdAtLocal || "日時取得中");
      const gpsHtml = r.gps
        ? `GPS：${r.gps.lat}, ${r.gps.lng}<br><a href="https://www.google.com/maps?q=${r.gps.lat},${r.gps.lng}" target="_blank">地図で確認</a><br>`
        : "GPS：未取得<br>";
      const photoHtml = r.photoUrl ? `<img src="${r.photoUrl}" alt="点呼写真">` : "写真：なし<br>";

      recordsDiv.innerHTML += `
        <div class="record">
          <strong>${r.driver || ""}</strong><br>
          ${date}<br>
          区分：${r.type || ""}<br>
          測定値：${r.alcoholValue || "未入力"}<br>
          アルコール：<span class="${r.alcohol === "異常あり" ? "danger" : ""}">${r.alcohol || ""}</span><br>
          体調：${r.health || ""}<br>
          車両：${r.carStatus || ""}<br>
          免許証：${r.licenseCheck || ""}<br>
          ${gpsHtml}
          備考：${r.memo || "なし"}<br>
          ${photoHtml}
        </div>
      `;
    });
  } catch (error) {
    console.error(error);
    recordsDiv.innerHTML = "読み込み失敗：" + (error.message || error);
  }
}

function downloadCsv() {
  if (!latestRecords.length) {
    alert("先に最新の点呼を表示してください");
    return;
  }

  const rows = [["日時", "ドライバー", "区分", "測定値", "アルコール", "体調", "車両", "免許証", "GPS", "備考", "写真URL"]];
  latestRecords.forEach(r => {
    const gps = r.gps ? `${r.gps.lat},${r.gps.lng}` : "未取得";
    rows.push([
      r.createdAtLocal || "",
      r.driver || "",
      r.type || "",
      r.alcoholValue || "",
      r.alcohol || "",
      r.health || "",
      r.carStatus || "",
      r.licenseCheck || "",
      gps,
      r.memo || "",
      r.photoUrl || ""
    ]);
  });

  const csv = "\uFEFF" + rows.map(row => row.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(",")).join("\n");
  const blob = new Blob([csv], { type:"text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "tenko_records_" + new Date().toISOString().slice(0,10) + ".csv";
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
