<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BELLE HOUSE 点呼システム</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b2341" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root{--navy:#0b2341;--bg:#f3f6fa;--card:#fff;--line:#d7e0ea;--text:#0b2341;--muted:#6b7a90;}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    header{background:var(--navy);color:white;text-align:center;padding:22px 12px;font-size:26px;font-weight:800;letter-spacing:.02em}
    main{max-width:980px;margin:24px auto;padding:0 14px}
    .card{background:var(--card);border-radius:18px;padding:22px;margin:16px 0;box-shadow:0 8px 28px rgba(10,30,60,.08)}
    h2{margin:0 0 18px;font-size:24px}.hidden{display:none!important}
    label{display:block;margin:14px 0 6px;font-weight:700}
    input,select,textarea{width:100%;padding:14px;border:1px solid #c9d5e3;border-radius:10px;font-size:16px;background:white}
    button{border:0;border-radius:10px;padding:14px 16px;font-size:16px;font-weight:800;cursor:pointer;background:var(--navy);color:white;margin:8px 6px 8px 0}
    button.secondary{background:#52647a}.danger{background:#b42318}.ok{background:#157347}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}.nav button{width:auto}
    table{width:100%;border-collapse:collapse;background:#fff;font-size:14px}
    th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}
    th{background:#eef3f8}.muted{color:var(--muted);font-size:14px}.pill{display:inline-block;padding:4px 9px;border-radius:999px;background:#eef3f8;margin:2px}
    img.photo{max-width:110px;border-radius:8px;border:1px solid var(--line)}
    @media(max-width:700px){header{font-size:21px}.row{grid-template-columns:1fr}.card{padding:18px}button{width:100%;margin-right:0}table{font-size:12px}}
  </style>
</head>
<body>
<header>BELLE HOUSE 点呼システム</header>
<main>
  <section id="loginBox" class="card">
    <h2>ログイン</h2>
    <label>ログイン区分</label>
    <select id="loginType">
      <option value="driver">ドライバー</option>
      <option value="admin">管理者</option>
    </select>
    <label>名前または管理者ID</label>
    <input id="loginName" placeholder="例：佐藤 / admin">
    <label>パスワード</label>
    <input id="loginPassword" type="password" placeholder="管理者は 1234">
    <button onclick="login()">ログイン</button>
    <p class="muted">管理者は <b>admin / 1234</b>。ドライバーは名前と任意のパスワードで入れます。</p>
  </section>

  <section id="driverBox" class="hidden">
    <div class="card">
      <h2>ドライバー点呼</h2>
      <p id="driverName" class="pill"></p>
      <div class="row">
        <div><label>アルコールチェック</label><select id="alcohol"><option>異常なし</option><option>異常あり</option></select></div>
        <div><label>体調</label><select id="health"><option>良好</option><option>不良</option></select></div>
      </div>
      <label>車両番号</label><input id="carNo" placeholder="例：品川480 あ 1234">
      <label>走行前メーター</label><input id="meter" inputmode="numeric" placeholder="例：12345">
      <label>写真</label><input id="photo" type="file" accept="image/*" capture="environment">
      <label>備考</label><textarea id="note" rows="3" placeholder="連絡事項など"></textarea>
      <button onclick="submitTenko()">点呼送信</button>
      <button class="secondary" onclick="logout()">ログアウト</button>
    </div>
  </section>

  <section id="adminBox" class="hidden">
    <div class="card">
      <h2>管理者ホーム</h2>
      <div class="nav">
        <button onclick="showAdmin('records')">点呼履歴</button>
        <button onclick="showAdmin('drivers')">ドライバー登録</button>
        <button onclick="downloadCSV()">CSV出力</button>
        <button class="danger" onclick="clearRecords()">履歴クリア</button>
        <button class="secondary" onclick="logout()">ログアウト</button>
      </div>
      <p class="muted">Ver.1.0 復旧版</p>
    </div>

    <div id="adminRecords" class="card">
      <h2>点呼履歴</h2>
      <div class="row">
        <div><label>表示</label><select id="filterMode" onchange="renderRecords()"><option value="today">今日のみ</option><option value="all">全期間</option></select></div>
        <div><label>名前検索</label><input id="searchName" oninput="renderRecords()" placeholder="ドライバー名"></div>
      </div>
      <div style="overflow:auto"><table><thead><tr><th>日時</th><th>名前</th><th>アルコール</th><th>体調</th><th>車両</th><th>メーター</th><th>写真</th><th>備考</th></tr></thead><tbody id="recordBody"></tbody></table></div>
    </div>

    <div id="adminDrivers" class="card hidden">
      <h2>ドライバー登録</h2>
      <div class="row">
        <div><label>ドライバー名</label><input id="newDriverName" placeholder="例：佐藤 太郎"></div>
        <div><label>電話番号</label><input id="newDriverTel" placeholder="例：090-0000-0000"></div>
      </div>
      <button onclick="addDriver()">登録</button>
      <div style="overflow:auto"><table><thead><tr><th>名前</th><th>電話番号</th><th>登録日</th><th>操作</th></tr></thead><tbody id="driverBody"></tbody></table></div>
    </div>
  </section>
</main>

<script>
const ADMIN_ID = "admin";
const ADMIN_PASS = "1234";
const LS_RECORDS = "tenkoRecords_v1";
const LS_DRIVERS = "tenkoDrivers_v1";
let currentUser = "";

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

function $(id){return document.getElementById(id)}
function nowText(){const d=new Date(); return d.toLocaleString("ja-JP",{hour12:false});}
function todayKey(){const d=new Date(); return d.toLocaleDateString("ja-JP");}
function getRecords(){return JSON.parse(localStorage.getItem(LS_RECORDS)||"[]")}
function setRecords(v){localStorage.setItem(LS_RECORDS,JSON.stringify(v))}
function getDrivers(){return JSON.parse(localStorage.getItem(LS_DRIVERS)||"[]")}
function setDrivers(v){localStorage.setItem(LS_DRIVERS,JSON.stringify(v))}

function login(){
  const type=$("loginType").value;
  const name=$("loginName").value.trim();
  const pass=$("loginPassword").value.trim();
  if(!name || !pass){alert("名前とパスワードを入力してください");return;}
  if(type==="admin"){
    if(name===ADMIN_ID && pass===ADMIN_PASS){
      $("loginBox").classList.add("hidden");
      $("adminBox").classList.remove("hidden");
      renderRecords(); renderDrivers();
    }else alert("管理者IDまたはパスワードが違います");
    return;
  }
  currentUser=name;
  $("driverName").textContent=currentUser+" さんでログイン中";
  $("loginBox").classList.add("hidden");
  $("driverBox").classList.remove("hidden");
}

function logout(){location.reload();}

function submitTenko(){
  const file=$("photo").files[0];
  const save=(photoData)=>{
    const rec={time:nowText(),date:todayKey(),name:currentUser,alcohol:$("alcohol").value,health:$("health").value,carNo:$("carNo").value,meter:$("meter").value,note:$("note").value,photo:photoData||""};
    const arr=getRecords(); arr.unshift(rec); setRecords(arr);
    alert("送信完了");
    $("carNo").value=""; $("meter").value=""; $("note").value=""; $("photo").value="";
  };
  if(file){
    const r=new FileReader();
    r.onload=()=>save(r.result);
    r.readAsDataURL(file);
  } else save("");
}

function showAdmin(mode){
  $("adminRecords").classList.toggle("hidden",mode!=="records");
  $("adminDrivers").classList.toggle("hidden",mode!=="drivers");
  if(mode==="records") renderRecords();
  if(mode==="drivers") renderDrivers();
}

function renderRecords(){
  const body=$("recordBody"); body.innerHTML="";
  const mode=$("filterMode").value;
  const q=$("searchName").value.trim();
  let arr=getRecords();
  if(mode==="today") arr=arr.filter(r=>r.date===todayKey());
  if(q) arr=arr.filter(r=>(r.name||"").includes(q));
  if(!arr.length){body.innerHTML='<tr><td colspan="8">履歴はありません</td></tr>';return;}
  arr.forEach(r=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${esc(r.time)}</td><td>${esc(r.name)}</td><td>${esc(r.alcohol)}</td><td>${esc(r.health)}</td><td>${esc(r.carNo||"")}</td><td>${esc(r.meter||"")}</td><td>${r.photo?`<img class="photo" src="${r.photo}">`:""}</td><td>${esc(r.note||"")}</td>`;
    body.appendChild(tr);
  });
}

function addDriver(){
  const name=$("newDriverName").value.trim(), tel=$("newDriverTel").value.trim();
  if(!name){alert("ドライバー名を入力してください");return;}
  const arr=getDrivers(); arr.unshift({name,tel,created:nowText()}); setDrivers(arr);
  $("newDriverName").value=""; $("newDriverTel").value=""; renderDrivers();
}

function renderDrivers(){
  const body=$("driverBody"); body.innerHTML="";
  const arr=getDrivers();
  if(!arr.length){body.innerHTML='<tr><td colspan="4">登録ドライバーはありません</td></tr>';return;}
  arr.forEach((d,i)=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${esc(d.name)}</td><td>${esc(d.tel||"")}</td><td>${esc(d.created)}</td><td><button class="danger" onclick="deleteDriver(${i})">削除</button></td>`;
    body.appendChild(tr);
  });
}
function deleteDriver(i){const arr=getDrivers(); arr.splice(i,1); setDrivers(arr); renderDrivers();}

function downloadCSV(){
  const rows=[["日時","名前","アルコール","体調","車両番号","メーター","備考"]];
  getRecords().forEach(r=>rows.push([r.time,r.name,r.alcohol,r.health,r.carNo||"",r.meter||"",r.note||""]));
  const csv=rows.map(row=>row.map(v=>`"${String(v).replaceAll('"','""')}"`).join(",")).join("\r\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="tenko-records.csv"; a.click();
}

function clearRecords(){
  if(confirm("点呼履歴をすべて削除しますか？")){localStorage.removeItem(LS_RECORDS); renderRecords();}
}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));}
</script>
</body>
</html>
