<!DOCTYPE html>
<html>
 <style>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f7fb;
  color: #1d2b3a;
}

#loginBox, #app {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #163a6b;
  font-size: 24px;
  margin-bottom: 20px;
}

h2 {
  color: #163a6b;
  border-bottom: 2px solid #163a6b;
  padding-bottom: 8px;
}

button {
  background: #163a6b;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 13px 16px;
  margin: 6px 3px;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  background: #0f2a4f;
}

input, select {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  border: 1px solid #b8c7d9;
  background: white;
  color: #1d2b3a;
  font-size: 16px;
  box-sizing: border-box;
}

#home, #tenkoPage, #driverPage, #missingPage, #historyPage {
  background: white;
  border-radius: 18px;
  padding: 20px;
  margin-top: 15px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}

#rekishi p, #driverList p, #missingList p {
  background: #f7f9fc;
  border-left: 6px solid #163a6b;
  padding: 13px;
  border-radius: 12px;
  margin: 10px 0;
}

hr {
  border: none;
  border-top: 1px solid #d6e0ec;
  margin: 15px 0;
}

p {
  line-height: 1.6;
}
</style>
</style> 
<head>
  <meta charset="UTF-8">
  <title>軽貨物 点呼アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c3e50">
</head>

<body>

<div id="loginBox">
  <h2>管理者ログイン</h2>
  <input id="pass" type="password" placeholder="パスワード">
  <button onclick="login()">ログイン</button>
</div>

<div id="app" style="display:none;">

  <h1>BELLE HOUSE SAFETY CHECK</h1>

  <button onclick="showPage('home')">ホーム</button>
  <button onclick="showPage('tenkoPage')">点呼入力</button>
  <button onclick="showPage('driverPage')">ドライバー登録</button>
  <button onclick="showPage('missingPage')">未点呼確認</button>
  <button onclick="showPage('historyPage')">点呼履歴</button>

  <hr>

  <div id="home">
    <h2>ホーム</h2>
    <p>Firebase連携版です。スマホとパソコンでデータ共有できます。</p>
  </div>

  <div id="tenkoPage" style="display:none;">
    <h2>点呼入力</h2>

    <p>名前</p>
    <select id="namae"></select>

    <p>アルコールチェック</p>
    <select id="alcohol">
      <option>異常なし</option>
      <option>異常あり</option>
    </select>

    <p>体調</p>
    <select id="health">
      <option>良好</option>
      <option>不良</option>
    </select>

    <br><br>
    <button onclick="tenko()">点呼する</button>
  </div>

  <div id="driverPage" style="display:none;">
    <h2>ドライバー登録</h2>
    <input id="driverName" type="text" placeholder="ドライバー名">
    <button onclick="addDriver()">登録</button>

    <h3>登録ドライバー</h3>
    <div id="driverList"></div>
  </div>

  <div id="missingPage" style="display:none;">
    <h2>未点呼確認</h2>
    <button onclick="renderMissing()">未点呼を確認</button>
    <div id="missingList"></div>
  </div>

  <div id="historyPage" style="display:none;">
    <h2>点呼履歴</h2>

    <p>ドライバー別表示</p>
    <select id="historyDriver"></select>
    <button onclick="renderByDriver()">このドライバーを表示</button>

    <br><br>
    <button onclick="renderToday()">今日のみ表示</button>
    <button onclick="renderAll()">全期間表示</button>
    <button onclick="exportCSV()">CSV出力</button>
    <button onclick="clearAll()">履歴クリア</button>

    <div id="rekishi"></div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCtj53F9aECPPfP1zQkVg5MPaoKWx7Y_cs",
  authDomain: "bellehouse-tenko.firebaseapp.com",
  projectId: "bellehouse-tenko",
  storageBucket: "bellehouse-tenko.firebasestorage.app",
  messagingSenderId: "384954757173",
  appId: "1:384954757173:web:f04243c699bcb4835ac17c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let drivers = [];
let tenkoList = [];

function login() {
  const pass = document.getElementById("pass").value;
  const adminPass = "1234";

  if (pass === adminPass) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";
    startRealtimeSync();
    showPage("home");
  } else {
    alert("パスワードが違います");
  }
}

function showPage(pageId) {
  const pages = ["home", "tenkoPage", "driverPage", "missingPage", "historyPage"];

  pages.forEach(id => {
    document.getElementById(id).style.display = "none";
  });

  document.getElementById(pageId).style.display = "block";

  if (pageId === "tenkoPage") loadDrivers();
  if (pageId === "driverPage") renderDrivers();
  if (pageId === "missingPage") renderMissing();
  if (pageId === "historyPage") {
    loadHistoryDrivers();
    renderToday();
  }
}

function getToday() {
  return new Date().toISOString().slice(0, 10);
}

function startRealtimeSync() {
  db.collection("drivers").orderBy("name").onSnapshot(snapshot => {
    drivers = [];
    snapshot.forEach(doc => {
      drivers.push({ id: doc.id, ...doc.data() });
    });
    loadDrivers();
    renderDrivers();
    loadHistoryDrivers();
  });

  db.collection("tenkoRecords").orderBy("createdAt", "desc").onSnapshot(snapshot => {
    tenkoList = [];
    snapshot.forEach(doc => {
      tenkoList.push({ id: doc.id, ...doc.data() });
    });
    renderToday();
  });
}

async function addDriver() {
  const name = document.getElementById("driverName").value.trim();

  if (name === "") {
    alert("ドライバー名を入力してください");
    return;
  }

  const exists = drivers.some(d => d.name === name);
  if (exists) {
    alert("すでに登録されています");
    return;
  }

  await db.collection("drivers").add({
    name: name,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("driverName").value = "";
  alert("登録しました");
}

async function deleteDriver(id) {
  if (confirm("このドライバーを削除しますか？")) {
    await db.collection("drivers").doc(id).delete();
  }
}

function loadDrivers() {
  const select = document.getElementById("namae");
  select.innerHTML = "";

  if (drivers.length === 0) {
    select.innerHTML = `<option value="">ドライバー未登録</option>`;
    return;
  }

  drivers.forEach(driver => {
    select.innerHTML += `<option>${driver.name}</option>`;
  });
}

function renderDrivers() {
  const div = document.getElementById("driverList");
  if (!div) return;

  div.innerHTML = "";

  if (drivers.length === 0) {
    div.innerHTML = "<p>まだ登録されていません。</p>";
    return;
  }

  drivers.forEach(driver => {
    div.innerHTML += `
      <p>
        ${driver.name}
        <button onclick="deleteDriver('${driver.id}')">削除</button>
      </p>
    `;
  });
}

async function tenko() {
  const namae = document.getElementById("namae").value;
  const alcohol = document.getElementById("alcohol").value;
  const health = document.getElementById("health").value;

  if (namae === "") {
    alert("ドライバーを登録してください");
    return;
  }

  await db.collection("tenkoRecords").add({
    name: namae,
    alcohol: alcohol,
    health: health,
    time: new Date().toLocaleString(),
    date: getToday(),
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  alert("点呼完了！");
}

function renderMissing() {
  const today = getToday();
  const div = document.getElementById("missingList");
  div.innerHTML = "";

  if (drivers.length === 0) {
    div.innerHTML = "<p>ドライバーが登録されていません。</p>";
    return;
  }

  drivers.forEach(driver => {
    const done = tenkoList.some(item => item.name === driver.name && item.date === today);

    if (done) {
      div.innerHTML += `<p>✅ ${driver.name}：点呼済み</p>`;
    } else {
      div.innerHTML += `<p style="color:red;">🔴 ${driver.name}：未点呼</p>`;
    }
  });
}

function renderToday() {
  const div = document.getElementById("rekishi");
  if (!div) return;

  div.innerHTML = "";
  const today = getToday();

  tenkoList.forEach(item => {
    if (item.date === today) {
      div.innerHTML += `
        <p>
          ${item.time}｜${item.name}｜${item.alcohol}｜${item.health}
          <button onclick="deleteOne('${item.id}')">削除</button>
        </p>
      `;
    }
  });
}

function renderAll() {
  const div = document.getElementById("rekishi");
  div.innerHTML = "";

  tenkoList.forEach(item => {
    div.innerHTML += `
      <p>
        ${item.time}｜${item.name}｜${item.alcohol}｜${item.health}
        <button onclick="deleteOne('${item.id}')">削除</button>
      </p>
    `;
  });
}

async function deleteOne(id) {
  if (confirm("この点呼記録を削除しますか？")) {
    await db.collection("tenkoRecords").doc(id).delete();
  }
}

async function clearAll() {
  if (!confirm("全部削除しますか？")) return;

  for (const item of tenkoList) {
    await db.collection("tenkoRecords").doc(item.id).delete();
  }

  alert("削除しました");
}

function loadHistoryDrivers() {
  const select = document.getElementById("historyDriver");
  select.innerHTML = "";

  if (drivers.length === 0) {
    select.innerHTML = `<option value="">ドライバー未登録</option>`;
    return;
  }

  drivers.forEach(driver => {
    select.innerHTML += `<option>${driver.name}</option>`;
  });
}

function renderByDriver() {
  const driver = document.getElementById("historyDriver").value;
  const div = document.getElementById("rekishi");

  div.innerHTML = "";

  tenkoList.forEach(item => {
    if (item.name === driver) {
      div.innerHTML += `
        <p>
          ${item.time}｜${item.name}｜${item.alcohol}｜${item.health}
          <button onclick="deleteOne('${item.id}')">削除</button>
        </p>
      `;
    }
  });
}

function exportCSV() {
  if (tenkoList.length === 0) {
    alert("データがありません");
    return;
  }

  const today = getToday();
  let csv = "\uFEFF時間,名前,アルコール,体調\n";

  tenkoList.forEach(item => {
    csv += `${item.time},${item.name},${item.alcohol},${item.health}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `tenko_${today}.csv`;
  a.click();

  URL.revokeObjectURL(url);
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
